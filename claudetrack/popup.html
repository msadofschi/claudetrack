<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Claude Usage</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>

  <!-- ── Header ──────────────────────────────────────────────────────── -->
  <div class="header">
    <div class="header-left">
      <div class="logo">
        <!-- Stylised bar-chart icon -->
        <svg viewBox="0 0 13 13" xmlns="http://www.w3.org/2000/svg">
          <rect x="1"  y="5"  width="3" height="7" rx="1"/>
          <rect x="5"  y="2"  width="3" height="10" rx="1"/>
          <rect x="9"  y="7"  width="3" height="5" rx="1"/>
        </svg>
      </div>
      <div class="title-block">
        <span class="app-name">Claude Usage</span>
        <span class="app-version" id="appVersion">v-</span>
      </div>
    </div>
    <button class="refresh-btn" id="refreshBtn" title="Refresh usage data">
      <!-- Refresh icon -->
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="23 4 23 10 17 10"/>
        <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
      </svg>
    </button>
  </div>

  <!-- ── Content — shown when data available ─────────────────────────── -->
  <div id="main" style="display:none">

    <div class="cards">

      <!-- Session card -->
      <div class="card" id="sessionCard">
        <div class="card-header">
          <span class="card-title">Current Session</span>
          <span class="card-pct" id="sessionPct">—</span>
        </div>
        <div class="progress-track">
          <div class="progress-fill" id="sessionBar" style="width:0%"></div>
        </div>
        <div class="reset-row">
          <!-- Clock icon -->
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/>
            <polyline points="12 6 12 12 16 14"/>
          </svg>
          <span id="sessionReset">—</span>
        </div>
        <div class="reset-label" id="sessionLabel"></div>
      </div>

      <!-- Weekly card -->
      <div class="card" id="weeklyCard">
        <div class="card-header">
          <span class="card-title">Weekly Limit</span>
          <span class="card-pct" id="weeklyPct">—</span>
        </div>
        <div class="progress-track">
          <div class="progress-fill" id="weeklyBar" style="width:0%"></div>
        </div>
        <div class="reset-row">
          <!-- Calendar icon -->
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="4" width="18" height="18" rx="2"/>
            <line x1="16" y1="2" x2="16" y2="6"/>
            <line x1="8"  y1="2" x2="8"  y2="6"/>
            <line x1="3"  y1="10" x2="21" y2="10"/>
          </svg>
          <span id="weeklyReset">—</span>
        </div>
        <div class="reset-label" id="weeklyLabel"></div>
      </div>

    </div><!-- /cards -->

    <!-- ── Footer ────────────────────────────────────────────────────── -->
    <div class="footer">
      <span class="last-updated" id="lastUpdated">Never updated</span>
      <button class="open-link" id="openUsagePage">
        Open usage page
        <svg width="10" height="10" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
          <polyline points="15 3 21 3 21 9"/>
          <line x1="10" y1="14" x2="21" y2="3"/>
        </svg>
      </button>
    </div>

  </div><!-- /main -->

  <!-- ── No-data placeholder ─────────────────────────────────────────── -->
  <div id="noData">
    <div class="no-data">
      <svg width="36" height="36" viewBox="0 0 24 24" fill="none"
           stroke="#5a5a70" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/>
        <line x1="12" y1="8" x2="12" y2="12"/>
        <line x1="12" y1="16" x2="12.01" y2="16"/>
      </svg>
      <p>No usage data yet.<br/>Click below to load your stats.</p>
      <button class="open-usage-btn" id="openUsageBtn">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
          <polyline points="15 3 21 3 21 9"/>
          <line x1="10" y1="14" x2="21" y2="3"/>
        </svg>
        Open claude.ai/settings/usage
      </button>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
